<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Manage Museums</title>

<style>
* {
  box-sizing: border-box;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f6f8;
}


.sidebar{
  width:230px;
  height:100vh;
  background:#1f2937;
  color:white;
  position:fixed;
  padding:20px 0;
  overflow-y:auto;
}

.sidebar h2{
  text-align:center;
  margin-bottom:30px;
  font-size:20px;
}

.sidebar a{
  display:block;
  padding:12px 22px;
  color:#d1d5db;
  text-decoration:none;
  font-size:15px;
  transition: all 0.3s ease;
}

.sidebar a:hover{
  background:#374151;
  color:#fff;
}


.main{
  margin-left:230px;
  padding:20px 30px;
  min-height:100vh;
  width:calc(100% - 230px);
  box-sizing:border-box;
}


.topbar{
  background:white;
  padding:15px 25px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  width:100%;
  box-sizing:border-box;
  position:relative;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.topbar h3{
  white-space:nowrap;
  overflow:visible;
  text-overflow:unset;
  margin:0;
}


.profile{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:12px;
  position:relative;
}

.admin-name{
  font-weight:bold;
  color:#374151;
}

.avatar{
  width:36px;
  height:36px;
  background:#2563eb;
  color:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:18px;
  transition: transform 0.2s ease;
}

.avatar:hover{
  transform: scale(1.05);
}

.dropdown{
  position:absolute;
  right:0;
  top:48px;
  background:white;
  border-radius:8px;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
  width:150px;
  display:none;
  overflow:hidden;
  z-index:100;
}

.dropdown a{
  display:block;
  padding:10px 15px;
  text-decoration:none;
  color:#374151;
  font-size:14px;
  transition: background 0.2s ease;
}

.dropdown a:hover{
  background:#f3f4f6;
}


h2{
  margin-bottom:20px;
  color:#1f2937;
}


.table-container{
  overflow-x:auto;
  background:white;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

table{
  width:100%;
  background:white;
  border-collapse:collapse;
  border-radius:8px;
  overflow:hidden;
}

th,td{
  padding:12px;
  border-bottom:1px solid #e5e7eb;
  text-align:left;
}

th{
  background:#f9fafb;
  font-weight:600;
  color:#374151;
}

tr:hover{
  background:#f9fafb;
}


button{
  padding:6px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  font-size:14px;
  transition: all 0.3s ease;
}

.edit-btn{
  background:#2563eb;
  color:white;
  margin-right:5px;
}

.edit-btn:hover{
  background:#1d4ed8;
  transform: translateY(-1px);
}

.delete-btn{
  background:#dc2626;
  color:white;
}

.delete-btn:hover{
  background:#b91c1c;
  transform: translateY(-1px);
}

.add-btn{
  margin-top:20px;
  background:#16a34a;
  color:white;
  padding:10px 18px;
  font-size:15px;
  font-weight:bold;
}

.add-btn:hover{
  background:#15803d;
  transform: translateY(-1px);
}

.refresh-btn{
  background:#6b7280;
  color:white;
  padding:8px 16px;
  margin-left:15px;
}

.refresh-btn:hover{
  background:#4b5563;
  transform: translateY(-1px);
}


.loading {
  text-align: center;
  padding: 40px;
  color: #6b7280;
  font-size: 14px;
}

.no-data {
  text-align: center;
  padding: 40px;
  color: #6b7280;
  font-size: 14px;
}

.error {
  text-align: center;
  padding: 40px;
  color: #dc2626;
  font-size: 14px;
}


@media (max-width: 768px) {
  .sidebar {
    width: 200px;
  }
  .main {
    margin-left: 200px;
    width: calc(100% - 200px);
    padding: 15px;
  }
  th, td {
    padding: 8px;
    font-size: 13px;
  }
  button {
    padding: 4px 8px;
    font-size: 12px;
  }
  .add-btn {
    padding: 8px 14px;
    font-size: 13px;
  }
}

@media (max-width: 600px) {
  .sidebar {
    width: 70px;
  }
  .sidebar h2 {
    font-size: 14px;
    text-align: center;
  }
  .sidebar a {
    padding: 10px;
    text-align: center;
    font-size: 11px;
  }
  .main {
    margin-left: 70px;
    width: calc(100% - 70px);
  }
  .topbar h3 {
    font-size: 14px;
  }
  .admin-name {
    display: none;
  }
  th, td {
    padding: 6px;
    font-size: 11px;
  }
  .edit-btn, .delete-btn {
    padding: 3px 6px;
    font-size: 10px;
  }
}
</style>

</head>

<body>


<div class="sidebar">
  <h2>Smart Museum</h2>
  <a href="admin-dashboard.html">📊 Dashboard</a>
  <a href="admin-museums.html">🏛️ Museums</a>
  <a href="admin-bookings.html">🎟️ Bookings</a>
  <a href="admin-users.html">👥 Users</a>
  <a href="#" onclick="logout()">🚪 Logout</a>
</div>


<div class="main">

  
  <div class="topbar">
    <div style="display:flex; align-items:center; gap:15px;">
      <h3>Manage Museums</h3>
      <button class="refresh-btn" onclick="loadMuseums()">🔄 Refresh</button>
    </div>

    <div class="profile">
      <span class="admin-name" id="adminName">Admin</span>
      <div class="avatar" onclick="toggleProfile()">👤</div>
      <div class="dropdown" id="profileDropdown">
        <a href="admin-profile.html">My Profile</a>
        <a href="#" onclick="logout()">Sign Out</a>
      </div>
    </div>
  </div>

  <h2>🏛️ All Museums</h2>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>City</th>
          <th>Category</th>
          <th>Opening Time</th>
          <th>Closing Time</th>
          <th>Actions</th>
         </tr>
      </thead>
      <tbody id="museumTable">
        <tr>
          <td colspan="7" class="loading">Loading museums...<td>
        </tr>
      </tbody>
    </table>
  </div>

  <button class="add-btn" onclick="addMuseum()">➕ Add New Museum</button>

</div>

<script>

const API_BASE_URL = "https://smart-museum-1.onrender.com";


(function(){
    const token = localStorage.getItem("adminToken");
    if(!token){
        window.location.replace("admin-signin.html");
    }
    
    
    const adminName = localStorage.getItem("adminName");
    if(adminName){
        document.getElementById("adminName").innerText = adminName;
    }
})();


function toggleProfile(){
  const d = document.getElementById("profileDropdown");
  d.style.display = d.style.display === "block" ? "none" : "block";
}

window.onclick = function(e){
  if(!e.target.closest(".profile")){
    document.getElementById("profileDropdown").style.display = "none";
  }
};


function logout(){
    if(confirm("Are you sure you want to logout?")){
        localStorage.removeItem("adminToken");
        localStorage.removeItem("adminName");
        localStorage.removeItem("adminEmail");
        window.location.replace("admin-signin.html");
    }
}


async function loadMuseums(){
    try {
        const token = localStorage.getItem("adminToken");
        const table = document.getElementById("museumTable");
        table.innerHTML = '<tr><td colspan="7" class="loading">🔄 Loading museums...</td></tr>';
        
        const response = await fetch(`${API_BASE_URL}/api/museums`, {
            headers: {
                "Authorization": token ? `Bearer ${token}` : "",
                "Content-Type": "application/json"
            }
        });
        
        if(!response.ok){
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        console.log("Museums loaded:", data.length);
        
        table.innerHTML = "";
        
        if(!data || data.length === 0){
            table.innerHTML = '<tr><td colspan="7" class="no-data">📭 No museums found. Click "Add New Museum" to create one.</td></tr>';
            return;
        }

        data.forEach(m => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><strong>${m.id || m.museum_id || 'N/A'}</strong></td>
                <td>${escapeHtml(m.name)}</td>
                <td>${escapeHtml(m.city || 'N/A')}</td>
                <td>${escapeHtml(m.category || 'N/A')}</td>
                <td>${m.open_time || 'N/A'}</td>
                <td>${m.close_time || 'N/A'}</td>
                <td>
                    <button class="edit-btn" onclick="editMuseum(${m.id})">✏️ Edit</button>
                    <button class="delete-btn" onclick="deleteMuseum(${m.id})">🗑 Delete</button>
                </td>
            `;
            table.appendChild(tr);
        });
        
    } catch (error) {
        console.error("Error loading museums:", error);
        document.getElementById("museumTable").innerHTML = 
            `<tr><td colspan="7" class="error">❌ Error loading museums: ${error.message}<br><br>Make sure backend is running at: ${API_BASE_URL}</td></tr>`;
    }
}


function editMuseum(id){
    if(id){
        window.location.href = `edit-museum.html?id=${id}`;
    } else {
        alert("Invalid museum ID");
    }
}


function addMuseum(){
    window.location.href = "add-museum.html";
}


async function deleteMuseum(id){
    if(!confirm("❗ Are you sure you want to delete this museum? This action cannot be undone.")) return;
    
    try {
        const token = localStorage.getItem("adminToken");
        const response = await fetch(`${API_BASE_URL}/api/museum/${id}`, {
            method: "DELETE",
            headers: {
                "Authorization": token ? `Bearer ${token}` : "",
                "Content-Type": "application/json"
            }
        });
        
        const data = await response.json();
        console.log("Delete response:", data);
        
        if(data.success){
            alert("✅ Museum deleted successfully");
            loadMuseums(); // Refresh the list
        } else {
            alert("❌ Delete failed: " + (data.message || "Unknown error"));
        }
    } catch (error) {
        console.error("Error deleting museum:", error);
        alert("❌ Server error: " + error.message);
    }
}


function escapeHtml(text) {
    if(!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}


document.addEventListener('DOMContentLoaded', () => {
    console.log("Manage Museums page loaded with API:", API_BASE_URL);
    loadMuseums();
});
</script>

</body>
</html>
